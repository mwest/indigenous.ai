# Fly.io configuration — indigenous.ai
app = "indigenous-ai"
primary_region = "yyz"   # Toronto: keeps data in Canada

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  APP_URL = "https://indigenous.ai"
  # Verified Resend sending identity is the subdomain send.indigenous.ai
  MAIL_FROM = "indigenous.ai <noreply@send.indigenous.ai>"

[http_service]
  internal_port = 8080
  force_https = true
  # SQLite lives on a single machine, so keep exactly one always running
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[mounts]
  source = "indigenous_data"
  destination = "/app/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
